# ============================================
# PHP CI/CD PIPELINE - GitHub Actions
# ============================================
# 🔧 WHAT THIS DOES:
#   - Runs on every push to 'main' and 'develop'
#   - Installs PHP with extensions
#   - Runs Composer to install dependencies
#   - Runs PHPUnit/Pest tests
#   - Deploys to server when pushing to 'main' or 'develop'
#
# ✏️ WHAT YOU NEED TO CHANGE:
#   1. PHP_VERSION: Change to your PHP version (7.4, 8.0, 8.1, 8.2, 8.3)
#   2. EXTENSIONS: Add/remove PHP extensions your app needs
#   3. TEST_CMD: Change to your actual test command
#   4. DEPLOY_PATH: Change to your server's deployment path
#   5. DEPLOY_SCRIPT: Change to your actual deployment commands
#   6. SECRETS: Add the following secrets in your repo settings:
#      - SSH_PRIVATE_KEY
#      - SERVER_USER
#      - SERVER_IP
#      - SERVER_PORT (optional, default: 22)
# ============================================

name: PHP CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------- JOB 1: TESTING ----------
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-versions: ['8.2']  # Change to your version: '7.4', '8.0', '8.1', '8.2', '8.3'
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup PHP with extensions
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, xml, ctype, json, tokenizer, bcmath, pdo_mysql, pdo_pgsql, intl, zip, curl
          coverage: xdebug
          tools: composer, phpunit
      
      # 3. Cache Composer dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            vendor/
            ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      
      # 4. Install Composer dependencies
      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress --no-suggest
          # If you have a composer.lock file, use 'composer install'
          # If you want to update dependencies, use 'composer update'
      
      # 5. Create .env file for testing
      - name: Create .env file
        run: |
          cp .env.example .env || echo "No .env.example found"
          php artisan key:generate || echo "Not a Laravel project"
      
     name: Git Leaks Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Optional for private repos
      
      # 7. Run PHP Code Sniffer (Optional - for code style)
      - name: Run PHPCS
        run: |
          if [ -f "./vendor/bin/phpcs" ]; then
            ./vendor/bin/phpcs --standard=PSR12 app/ src/ --ignore=vendor/ || true
          else
            echo "PHPCS not installed, skipping..."
          fi
        continue-on-error: true
      
      # 8. Run PHPStan (Optional - static analysis)
      - name: Run PHPStan
        run: |
          if [ -f "./vendor/bin/phpstan" ]; then
            ./vendor/bin/phpstan analyse app/ src/ --level=5 || true
          else
            echo "PHPStan not installed, skipping..."
          fi
        continue-on-error: true
  
  # ---------- JOB 2: DEPLOYMENT ----------
  deploy:
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on specific branches
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Deployment script
            set -e  # Exit on error
            
            # CHANGE THESE VARIABLES FOR YOUR PROJECT
            DEPLOY_PATH="/var/www/your-app"
            PHP_VERSION="8.2"
            
            echo "🚀 Starting deployment to $DEPLOY_PATH"
            
            # Navigate to deployment directory
            cd $DEPLOY_PATH || { echo "❌ Directory not found: $DEPLOY_PATH"; exit 1; }
            
            # Pull latest code
            echo "📦 Pulling latest code from ${{ github.ref_name }} branch..."
            git pull origin ${{ github.ref_name }}
            
            # Install/update dependencies
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --prefer-dist
            
            # Run database migrations
            if [ -f "artisan" ]; then
              echo "📦 Running Laravel migrations..."
              php artisan migrate --force
              
              echo "📦 Clearing and caching configuration..."
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              
              echo "📦 Running queue restart..."
              php artisan queue:restart
            fi
            
            # Set permissions
            echo "📦 Setting file permissions..."
            sudo chown -R www-data:www-data .
            sudo chmod -R 755 storage bootstrap/cache
            
            # Restart PHP-FPM
            echo "📦 Restarting PHP-FPM..."
            sudo systemctl restart php$PHP_VERSION-fpm || sudo service php$PHP_VERSION-fpm restart
            
            # Restart Nginx (optional)
            # sudo systemctl restart nginx
            
            # Clear OPcache if needed
            echo "📦 Clearing OPcache..."
            sudo systemctl reload php$PHP_VERSION-fpm
            
            echo "✅ Deployment complete to ${{ github.ref_name }} branch!"
            
            # Show current version
            echo "📋 Current commit:"
            git log -1 --pretty=format:"%h - %s (%an, %ar)"
