# ============================================
# PHP CI/CD PIPELINE - GitHub Actions
# ============================================
# 🔧 WHAT THIS DOES:
#   - Runs on every push to 'main' and on pull requests
#   - Installs PHP with extensions
#   - Runs Composer to install dependencies
#   - Runs PHPUnit/Pest tests
#   - Deploys to server when pushing to 'main'
#
# ✏️ WHAT YOU NEED TO CHANGE:
#   1. PHP_VERSION: Change to your PHP version (7.4, 8.0, 8.1, 8.2, 8.3)
#   2. EXTENSIONS: Add/remove PHP extensions your app needs
#   3. TEST_CMD: Change to your actual test command
#   4. DEPLOY_PATH: Change to your server's deployment path
#   5. DEPLOY_SCRIPT: Change to your actual deployment commands
#   6. SECRETS: Add the following secrets in your repo settings:
#      - SSH_PRIVATE_KEY
#      - SERVER_USER
#      - SERVER_IP
# ============================================

name: PHP CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------- JOB 1: TESTING ----------
  test:
    runs-on: ubuntu-latest
    
    # 👇 CHANGE THIS: Your PHP version and extensions
    strategy:
      matrix:
        php-versions: ['8.2']  # Change to your version: '7.4', '8.0', '8.1', '8.2', '8.3'
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup PHP with extensions
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          # 👇 CHANGE THIS: Add/remove extensions your app needs
          extensions: mbstring, xml, ctype, json, tokenizer, bcmath, pdo_mysql, pdo_pgsql, intl
          coverage: xdebug
      
      # 3. Cache Composer dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-
      
      # 4. Install Composer dependencies
- name: Install dependencies
  run: composer update --prefer-dist --no-progress --no-suggest
      
      # 5. Run tests
      - name: Run tests
        # 👇 CHANGE THIS: Your actual test command
        run: |
          ./vendor/bin/phpunit --testdox
          # OR if using Pest:
          # ./vendor/bin/pest
      
      # 6. Run PHP Code Sniffer (Optional - for code style)
      - name: Run PHPCS
        # 👇 REMOVE THIS BLOCK if you don't use PHPCS
        run: |
          ./vendor/bin/phpcs --standard=PSR12 app/
        continue-on-error: true  # Don't fail the build for style issues
  
  # ---------- JOB 2: DEPLOYMENT ----------
  deploy:
    runs-on: ubuntu-latest
    needs: test  # Only runs if 'test' job succeeds
    # 👇 CHANGE THIS: Only deploy on specific branches
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 👇 CHANGE THIS: Your deployment path
            cd /var/www/your-app
            
            # 👇 CHANGE THIS: Your deployment commands
            echo "📦 Pulling latest code..."
            git pull origin ${{ github.ref_name }}
            
            echo "📦 Installing dependencies..."
            composer install --no-dev --optimize-autoloader
            
            echo "📦 Running migrations..."
            php artisan migrate --force  # For Laravel
            
            echo "📦 Clearing cache..."
            php artisan cache:clear
            php artisan config:clear
            php artisan view:clear
            php artisan route:clear
            
            echo "📦 Restarting PHP-FPM..."
            sudo systemctl restart php8.2-fpm  # Change to your PHP version
            
            echo "✅ Deployment complete!"
